apiVersion: apps/v1
kind: Deployment
metadata:
  name: baltfloods-tallinn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: baltfloods-tallinn
  template:
    metadata:
      labels:
        app: baltfloods-tallinn
    spec:
      containers:
        - name: baltfloods-tallinn
          image: 'registry.k8s.gu.se/appademin/baltfloods:0.4.3-tallinn'
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: web
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: baltfloods-tallinn-service
spec:
  selector:
    app: baltfloods-tallinn
  ports:
    - protocol: TCP
      port: 8080
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: baltfloods-tallinn
  annotations:
    kubernetes.io/tls-acme: "true"
spec:
  host: baltfloods-tallinn.prod.appadem.in
  to:
    kind: Service
    name: baltfloods-tallinn-service
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
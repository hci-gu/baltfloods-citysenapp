<main class="auth-page flex-column">
  <section class="card flex-column" [formGroup]="loginForm">
    <h2 class="title">Admin login</h2>
    <p class="subtitle body-sm">
      Sign in with a PocketBase superuser account to access the admin view.
    </p>

    <div class="field flex-column">
      <label class="p-label" for="email">Email</label>
      <input pInputText id="email" type="email" formControlName="email" />
      @if (loginForm.controls.email.touched && loginForm.controls.email.invalid) {
        <small class="p-error">Please enter a valid email address.</small>
      }
    </div>

    <div class="field flex-column">
      <label class="p-label" for="password">Password</label>
      <input
        pInputText
        id="password"
        type="password"
        formControlName="password"
      />
    </div>

    @if (errorMessage) {
      <small class="p-error">{{ errorMessage }}</small>
    }

    <p-button
      label="Sign in"
      [loading]="isSubmitting"
      [disabled]="loginForm.invalid || isSubmitting"
      (click)="onSubmit()"
    ></p-button>

    <a class="back-link" routerLink="/">Back to map</a>
  </section>
</main>
